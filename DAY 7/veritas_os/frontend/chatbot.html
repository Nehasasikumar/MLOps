<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VERITAS AI</title>

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div>

      <div class="logo">

        <div class="logo-box"></div>

        <span>VERITAS</span>

      </div>

      <button class="new-chat">
        + New Chat
      </button>

      <div class="history">

        <p class="history-title">
          RECENT
        </p>

        <div class="history-item active">
          Climate contradiction analysis
        </div>

        <div class="history-item">
          AI medical report audit
        </div>

        <div class="history-item">
          Quantum benchmark verification
        </div>

      </div>

    </div>

  </aside>

  <!-- MAIN -->

  <main class="main">

    <div class="chat-area" id="chatArea">

      <div class="welcome-text">

        <h1>
          Talk to the ingestion agent
        </h1>

        <p>
          Upload files or paste URLs to analyze and verify content.
        </p>

      </div>

    </div>

    <!-- INPUT -->

    <div class="input-section">

      <div class="upload-options">

        <button>PDF</button>
        <button>VIDEO</button>
        <button>AUDIO</button>
        <button>IMAGE</button>
        <button>URL</button>

      </div>

      <div class="input-box">

        <input
          type="text"
          id="messageInput"
          placeholder="Describe a source or upload content..."
        >

        <button class="send-btn">
          ↑
        </button>

      </div>

    </div>

  </main>

</div>

<script src="js/app.js"></script>

</body>
</html>
